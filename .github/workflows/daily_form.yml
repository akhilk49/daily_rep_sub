name: Daily Form Submission

on:
  schedule:
    # Runs Mon-Fri at 5:30 PM IST (12:00 UTC)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq playwright python-dotenv google-api-python-client google-auth

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run form submission
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AUTH_STATE: ${{ secrets.GOOGLE_AUTH_STATE }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python main.py
